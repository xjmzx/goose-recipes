version: 1.0.0
title: daily_standup1.0
description: A simple scheduled recipe that runs daily standup checks
instructions: |
  # Schedule using cron syntax
  schedule:
    cron: "0 9 * * 1-5"  # Run at 9 AM on weekdays (Monday-Friday)
    timezone: "America/New_York"  # Optional: specify timezone
  
  # The tasks to run when scheduled
  tasks:
    - name: check_tasks
      description: Check today's tasks and priorities
      steps:
        - action: shell
          command: echo "Running daily standup at $(date)"
        
        - action: notify
          message: "Daily standup reminder: Review your tasks for today!"
        
        - action: shell
          command: |
            echo "=== Daily Standup Checklist ==="
            echo "1. What did you accomplish yesterday?"
            echo "2. What are you working on today?"
            echo "3. Any blockers or challenges?"
  
  # Optional: configuration options
  config:
    enabled: true
    retry_on_failure: true
    max_retries: 3
    timeout_minutes: 5
  
  # Optional: notifications
  notifications:
    on_success: true
    on_failure: true
    channels:
      - type: console
  
activities: []
parameters: []
